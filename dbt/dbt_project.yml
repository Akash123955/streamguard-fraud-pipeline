name: 'streamguard'
version: '1.0.0'
config-version: 2

profile: 'streamguard'   # matches ~/.dbt/profiles.yml

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Medallion Architecture: Bronze → Silver → Gold
# Each layer builds on the previous, never modifying raw data
models:
  streamguard:
    bronze:
      +schema: bronze
      +materialized: incremental   # Only process new rows each run
      +tags: ["bronze", "raw"]
    silver:
      +schema: silver
      +materialized: incremental
      +tags: ["silver", "cleaned"]
    gold:
      +schema: gold
      +materialized: table         # Gold = final analytics tables, full refresh
      +tags: ["gold", "analytics"]
