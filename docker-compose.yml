# StreamGuard Fraud Detection Pipeline — Full Stack
# Run with: docker-compose up -d
# Kafka UI:  http://localhost:8080
# Spark UI:  http://localhost:8081

services:

  # ── Zookeeper — Kafka's coordination service ──────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: streamguard-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped

  # ── Kafka Broker — the event streaming backbone ────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: streamguard-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # 9092 = internal (container-to-container), 9093 = external (your Mac)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    restart: unless-stopped

  # ── Kafka Topic Setup — creates our 3 topics on startup ───────────────────
  kafka-setup:
    image: confluentinc/cp-kafka:7.5.0
    container_name: streamguard-kafka-setup
    depends_on:
      - kafka
    command: bash -c "echo 'Waiting for Kafka...' && sleep 15 && kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic raw-transactions --partitions 6 --replication-factor 1 && kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic fraud-alerts --partitions 3 --replication-factor 1 && kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic approved-transactions --partitions 3 --replication-factor 1 && echo 'Topics created!' && kafka-topics --list --bootstrap-server kafka:9092"
    restart: on-failure

  # ── Kafka UI — browse topics and messages at http://localhost:8080 ─────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: streamguard-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: streamguard
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    restart: unless-stopped

  # ── Spark Master — coordinates distributed processing ─────────────────────
  spark-master:
    image: apache/spark:3.5.0
    container_name: streamguard-spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8081
    ports:
      - "8081:8081"   # Spark Web UI
      - "7077:7077"   # Spark master port
    volumes:
      - .:/opt/spark/work-dir   # Mount project so spark-submit can access files
    restart: unless-stopped

  # ── Spark Worker — executes the actual streaming jobs ─────────────────────
  spark-worker:
    image: apache/spark:3.5.0
    container_name: streamguard-spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    environment:
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: 2
    restart: unless-stopped
